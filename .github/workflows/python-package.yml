name: Python package

on:
  push:
    branches: [ "master", "v*-dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      # PyQt6 (pulled in via hashharvest.keystore) imports headlessly on CI
      # runners with no display when the Qt platform is set to offscreen.
      QT_QPA_PLATFORM: offscreen

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 runtime libraries
      # PyQt6's offscreen platform still dlopens libEGL/libGL/xkbcommon/dbus,
      # which are not present by default on the headless ubuntu runner.
      run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Fail the build only on real errors: syntax errors / undefined names.
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Everything else is advisory and never fails the build.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: pytest -q --cov=hashharvest --cov-report=term-missing

  build-windows:
    runs-on: windows-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: pyinstaller HashHarvest.spec

    - name: Upload HashHarvest.exe
      uses: actions/upload-artifact@v4
      with:
        name: HashHarvest-windows
        path: dist/HashHarvest.exe
